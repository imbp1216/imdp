    opts = opts || {};
    return new Promise(function(resolve){
      var overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      var box = document.createElement('div');
      box.className = 'modal-box';
      box.setAttribute('role', 'dialog');
      box.setAttribute('aria-modal', 'true');

      var titleEl = document.createElement('div');
      titleEl.className = 'modal-title';
      titleEl.textContent = opts.title || '확인';
      box.appendChild(titleEl);

      if(opts.message){
        var msgEl = document.createElement('div');
        msgEl.className = 'modal-message';
        msgEl.textContent = opts.message;
        box.appendChild(msgEl);
      }

      var actions = document.createElement('div');
      actions.className = 'modal-actions';
      var cancelBtn = document.createElement('button');
      cancelBtn.className = 'modal-btn cancel';
      cancelBtn.textContent = opts.cancelText || '취소';
      var okBtn = document.createElement('button');
      okBtn.className = 'modal-btn ' + (opts.danger ? 'danger' : 'confirm');
      okBtn.textContent = opts.confirmText || '확인';
      actions.appendChild(cancelBtn);
      actions.appendChild(okBtn);
      box.appendChild(actions);
      overlay.appendChild(box);
      document.body.appendChild(overlay);

      var closed = false;
      function close(val){
        if(closed) return; closed = true;
        document.removeEventListener('keydown', onKey, true);
        overlay.classList.remove('show');
        setTimeout(function(){ if(overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 170);
        resolve(val);
      }
      function onKey(e){
        if(e.key === 'Escape'){ e.preventDefault(); e.stopPropagation(); close(false); }
        else if(e.key === 'Enter'){ e.preventDefault(); e.stopPropagation(); close(true); }
      }
      cancelBtn.addEventListener('click', function(){ close(false); });
      okBtn.addEventListener('click', function(){ close(true); });
      overlay.addEventListener('mousedown', function(e){ if(e.target === overlay) close(false); });
      document.addEventListener('keydown', onKey, true);
      requestAnimationFrame(function(){ overlay.classList.add('show'); okBtn.focus(); });
    });
  }

  /* ============================================================
     찾기 / 바꾸기 (VS Code 스타일)
     ============================================================ */
  function escapeRegExp(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  function scrollToOffset(ta, offset){
    var cs = getComputedStyle(ta);
    var lh = parseFloat(cs.lineHeight);
    if(isNaN(lh)) lh = (parseFloat(cs.fontSize) || 15) * 1.85;
    var padTop = parseFloat(cs.paddingTop) || 0;
    var line = ta.value.slice(0, offset).split('\n').length - 1;
    var target = padTop + line * lh - ta.clientHeight / 2 + lh;
    ta.scrollTop = Math.max(0, target);
  }

  function openFindForActivePane(withReplace){
    var pane = getPane(state.activePaneId); if(!pane) return false;
    var section = workspaceEl.querySelector('.pane[data-pane="'+pane.id+'"]'); if(!section) return false;
    var ta = section.querySelector('textarea.editor'); if(!ta) return false;
    var note = getNote(pane.active); if(!note) return false;
    var widget = section.querySelector('.find-widget');
    if(!widget) widget = buildFindWidget(section, pane, note, ta);
    widget.__open(withReplace);
    return true;
  }

  function buildFindWidget(section, pane, note, ta){
    var flags = { case:false, word:false, regex:false };
    var matches = [];
    var current = -1;

    var widget = document.createElement('div');
    widget.className = 'find-widget';

    var toggle = document.createElement('button');
    toggle.className = 'find-toggle';
    toggle.title = '바꾸기 전환';
    toggle.innerHTML = ICON.chevron;

    var rows = document.createElement('div');
    rows.className = 'find-rows';

    var findRow = document.createElement('div');
    findRow.className = 'find-row';
    var findField = document.createElement('div');
    findField.className = 'find-field';
    var findInput = document.createElement('input');
    findInput.type = 'text';
    findInput.placeholder = '찾기';
    findField.appendChild(findInput);
    var flagsWrap = document.createElement('div');
    flagsWrap.className = 'find-flags';
    function makeFlag(key, label, title){
      var b = document.createElement('button');
      b.className = 'flag-btn'; b.textContent = label; b.title = title;
      b.addEventListener('click', function(){ flags[key] = !flags[key]; b.classList.toggle('on', flags[key]); recompute(true); findInput.focus(); });
      return b;
    }
    flagsWrap.appendChild(makeFlag('case', 'Aa', '대/소문자 구분'));
    flagsWrap.appendChild(makeFlag('word', 'ab', '단어 단위로'));
    flagsWrap.appendChild(makeFlag('regex', '.*', '정규식 사용'));
    findField.appendChild(flagsWrap);

    var count = document.createElement('span');
    count.className = 'find-count';
    count.textContent = '';

    var nav = document.createElement('div');
    nav.className = 'find-nav';
    var prevBtn = document.createElement('button'); prevBtn.className = 'find-icon-btn'; prevBtn.title = '이전 (Shift+Enter)'; prevBtn.innerHTML = ICON.arrowUp;
    var nextBtn = document.createElement('button'); nextBtn.className = 'find-icon-btn'; nextBtn.title = '다음 (Enter)'; nextBtn.innerHTML = ICON.arrowDown;
    var closeBtn = document.createElement('button'); closeBtn.className = 'find-icon-btn'; closeBtn.title = '닫기 (Esc)'; closeBtn.innerHTML = ICON.close;
    nav.appendChild(prevBtn); nav.appendChild(nextBtn); nav.appendChild(closeBtn);

    findRow.appendChild(findField);
    findRow.appendChild(count);
    findRow.appendChild(nav);

    var replaceRow = document.createElement('div');
    replaceRow.className = 'replace-row';
    var replaceField = document.createElement('div');
    replaceField.className = 'find-field';
    var replaceInput = document.createElement('input');
    replaceInput.type = 'text';
    replaceInput.placeholder = '바꾸기';
    replaceField.appendChild(replaceInput);
    var replaceOne = document.createElement('button'); replaceOne.className = 'replace-btn'; replaceOne.textContent = '바꾸기';
    var replaceAll = document.createElement('button'); replaceAll.className = 'replace-btn'; replaceAll.textContent = '모두 바꾸기';
    replaceRow.appendChild(replaceField);
    replaceRow.appendChild(replaceOne);
    replaceRow.appendChild(replaceAll);

    rows.appendChild(findRow);
    rows.appendChild(replaceRow);
    widget.appendChild(toggle);
    widget.appendChild(rows);
    section.appendChild(widget);

    function buildRegex(){
      var q = findInput.value;
      if(!q) return null;
      var pattern = flags.regex ? q : escapeRegExp(q);
      if(flags.word) pattern = '\\b' + pattern + '\\b';
      try { return new RegExp(pattern, flags.case ? 'g' : 'gi'); }
      catch(e){ return false; }
    }
    function updateNavDisabled(){
      var none = matches.length === 0;
      prevBtn.disabled = none; nextBtn.disabled = none;
      replaceOne.disabled = none; replaceAll.disabled = none;
    }
    function recompute(resetToFirst){
      matches = [];
      findField.classList.remove('invalid');
      var re = buildRegex();
      if(re === false){ findField.classList.add('invalid'); current = -1; count.textContent = '잘못된 정규식'; updateNavDisabled(); return; }
      if(re){
        var text = ta.value, m;
        while((m = re.exec(text))){
          matches.push({ start: m.index, end: m.index + m[0].length });
          if(m[0].length === 0) re.lastIndex++;
        }
      }
      if(!matches.length){ current = -1; count.textContent = findInput.value ? '결과 없음' : ''; updateNavDisabled(); return; }
      if(resetToFirst || current < 0 || current >= matches.length){
        var caret = ta.selectionStart;
        current = 0;
        for(var i=0;i<matches.length;i++){ if(matches[i].start >= caret){ current = i; break; } }
      }
      select();
    }
    function select(){
      if(current < 0 || !matches[current]){ updateNavDisabled(); return; }
      var mt = matches[current];
      ta.setSelectionRange(mt.start, mt.end);
      scrollToOffset(ta, mt.start);
      count.textContent = (current+1) + ' / ' + matches.length;
      updateNavDisabled();
    }
    function go(delta){
      if(!matches.length) return;
      current = (current + delta + matches.length) % matches.length;
      select();
    }
    function doReplaceOne(){
      if(current < 0 || !matches[current]) return;
      var mt = matches[current];
      var rep = replaceInput.value;
      ta.value = ta.value.slice(0, mt.start) + rep + ta.value.slice(mt.end);
      onEditorChanged(note, pane, ta);
      ta.selectionStart = ta.selectionEnd = mt.start + rep.length;
      recompute(true);
    }
    function doReplaceAll(){
      if(!matches.length) return;
      var rep = replaceInput.value;
      var text = ta.value;
      var n = matches.length;
      for(var i = n - 1; i >= 0; i--){ text = text.slice(0, matches[i].start) + rep + text.slice(matches[i].end); }
      ta.value = text;
      onEditorChanged(note, pane, ta);
      recompute(true);
      toast(n + '개를 바꿨습니다');
    }
    function closeWidget(){ if(widget.parentNode) widget.parentNode.removeChild(widget); ta.focus(); }

    findInput.addEventListener('input', function(){ recompute(true); });
    findInput.addEventListener('keydown', function(e){
      if(e.isComposing || e.keyCode === 229) return;
      if(e.key === 'Enter'){ e.preventDefault(); go(e.shiftKey ? -1 : 1); }
      else if(e.key === 'Escape'){ e.preventDefault(); closeWidget(); }
    });
    replaceInput.addEventListener('keydown', function(e){
      if(e.isComposing || e.keyCode === 229) return;
      if(e.key === 'Enter'){ e.preventDefault(); doReplaceOne(); }
      else if(e.key === 'Escape'){ e.preventDefault(); closeWidget(); }
    });
    prevBtn.addEventListener('click', function(){ go(-1); findInput.focus(); });
    nextBtn.addEventListener('click', function(){ go(1); findInput.focus(); });
    closeBtn.addEventListener('click', closeWidget);
    toggle.addEventListener('click', function(){
      widget.classList.toggle('show-replace');
      if(widget.classList.contains('show-replace')) replaceInput.focus(); else findInput.focus();
    });
    replaceOne.addEventListener('click', function(){ doReplaceOne(); findInput.focus(); });
    replaceAll.addEventListener('click', function(){ doReplaceAll(); findInput.focus(); });

    widget.__open = function(withReplace){
      widget.classList.toggle('show-replace', !!withReplace);
      var sel = ta.value.slice(ta.selectionStart, ta.selectionEnd);
      if(sel && sel.indexOf('\n') === -1) findInput.value = sel;
      recompute(true);
      var target = withReplace ? replaceInput : findInput;
      target.focus(); target.select();
    };

    return widget;
  }

  function seed(){
    var note = makeNote(WELCOME);
    note.title = '마크다운 문법';
    note.autoTitle = false;
    var pane = makePane([note.id], note.id);
    pane.mode = 'both';
    state = { notes:[note], folders:[], panes:[pane], activePaneId:pane.id, sidebarCollapsed:false };
  }

  /* ============================================================
     초기화
     ============================================================ */
  function bindGlobal(){
    document.addEventListener('keydown', function(e){
      var mod = e.ctrlKey || e.metaKey;
      if(!mod || e.altKey) return;
      var k = e.key.toLowerCase();
      if(k === 'f' && !e.shiftKey){ if(openFindForActivePane(false)) e.preventDefault(); }
      else if(k === 'h' && !e.shiftKey){ if(openFindForActivePane(true)) e.preventDefault(); }
    }, true);
    document.getElementById('new-note-btn').addEventListener('click', function(){ createAndOpenInPane(state.activePaneId); });
    document.getElementById('new-folder-btn').addEventListener('click', function(){ createFolder(null); });
    document.getElementById('logo-toggle').addEventListener('click', function(){ setSidebarCollapsed(!state.sidebarCollapsed); });
    document.getElementById('expand-btn').addEventListener('click', function(){ setSidebarCollapsed(false); });
    var lob = document.getElementById('logout-btn'); if(lob) lob.addEventListener('click', doLogout);
    searchInput.addEventListener('input', function(){ renderSidebar(); });

    noteListEl.addEventListener('click', function(e){
      var niBtn = e.target.closest && e.target.closest('.ni-btn');
      if(niBtn){
        e.stopPropagation();
        var act = niBtn.dataset.act;
        var nRow = niBtn.closest('.note-item');
        var fRow = niBtn.closest('.folder-item');
        if(nRow){
          var nid = nRow.dataset.id;
          if(act === 'rename') startRename(nid);
          else if(act === 'export') exportNote(nid);
          else if(act === 'delete') deleteNote(nid);
        } else if(fRow){
          var fid = fRow.dataset.folderId;
          if(act === 'folder-new') createFolder(fid);
          else if(act === 'folder-rename') startRenameFolder(fid);
          else if(act === 'folder-delete') deleteFolder(fid);
        }
        return;
      }
      var folderRow = e.target.closest && e.target.closest('.folder-item');
      if(folderRow){ toggleFolderCollapsed(folderRow.dataset.folderId); return; }
      var noteRow = e.target.closest && e.target.closest('.note-item');
      if(noteRow){ openNote(noteRow.dataset.id, state.activePaneId); return; }
    });

    noteListEl.addEventListener('dblclick', function(e){
      if(e.target.closest && e.target.closest('.ni-btn')) return;
      var titleEl = e.target.closest && e.target.closest('.note-title');
      var row = e.target.closest && e.target.closest('.note-item');
      if(titleEl && row) startRename(row.dataset.id);
    });

    noteListEl.addEventListener('dragover', function(e){
      if(!dragItem) return;
      e.preventDefault();
      if(e.dataTransfer) e.dataTransfer.dropEffect = 'move';
      clearSidebarDropMarks();
      noteListEl.classList.add('drop-root');
    });
    noteListEl.addEventListener('dragleave', function(e){
      if(e.target === noteListEl) noteListEl.classList.remove('drop-root');
    });
    noteListEl.addEventListener('drop', function(e){
      if(!dragItem) return;
      e.preventDefault();
      var it = dragItem;
      clearSidebarDropMarks();
      if(it.kind === 'note') moveNoteToFolder(it.id, null);
      else if(it.kind === 'folder') moveFolderToFolder(it.id, null);
    });
  }

  function clearStateBlank(){
    var p = makePane([], null);
    state = { notes:[], folders:[], panes:[p], activePaneId:p.id, sidebarCollapsed: !!state.sidebarCollapsed };
  }
  function bootRender(){
    appEl.classList.toggle('sidebar-collapsed', !!state.sidebarCollapsed);
    var lt0 = document.getElementById('logo-toggle');
    if(lt0) lt0.title = state.sidebarCollapsed ? '사이드바 펼치기' : '사이드바 접기';
    renderSidebar();
    renderWorkspace();
    focusEditor(state.activePaneId);
    updateAccountUI();
  }
  function updateAccountUI(){
    var lo = document.getElementById('logout-btn');
    if(lo){
      if(cloud.on && cloud.token){ lo.style.display = 'flex'; lo.title = '로그아웃' + (cloud.email ? ' (' + cloud.email + ')' : ''); }
      else lo.style.display = 'none';
    }
  }
  function showAuth(loading){
    var o = document.getElementById('auth-overlay'); if(o) o.style.display = 'flex';
    var form = document.getElementById('auth-form'); var load = document.getElementById('auth-loading');
    if(form) form.style.display = loading ? 'none' : 'flex';
    if(load) load.style.display = loading ? 'block' : 'none';
  }
  function hideAuth(){ var o = document.getElementById('auth-overlay'); if(o) o.style.display = 'none'; }
  function doLogout(){
    cloud.token = null; cloud.refresh = null; cloud.userId = null; cloud.email = null;
    clearSessionStore();
    clearStateBlank();
    showAuth(false);
    bootRender();
  }
  function bindAuthUI(){
    var loginBtn = document.getElementById('auth-login');
    var signupBtn = document.getElementById('auth-signup');
    if(!loginBtn) return;
    var emailEl = document.getElementById('auth-email');
    var pwEl = document.getElementById('auth-pw');
    var errEl = document.getElementById('auth-error');
    function setErr(m){ if(errEl) errEl.textContent = m || ''; }
    function busy(b){ loginBtn.disabled = b; signupBtn.disabled = b; }
    function finishLogin(){
      showAuth(true);
      cloudLoad().then(function(r){
        if(!(r.found && applyLoadedState(r.data))) seed();
        hideAuth(); busy(false); bootRender(); cloudPush();
      }).catch(function(){ seed(); hideAuth(); busy(false); bootRender(); cloudPush(); });
    }
    function doAuth(kind){
      var email = (emailEl.value || '').trim(), pw = pwEl.value || '';
      if(!email || !pw){ setErr('이메일과 비밀번호를 입력하세요.'); return; }
      setErr(''); busy(true);
      supaAuth(kind, email, pw).then(function(res){
        if(!res.ok){
          var raw = res.body && (res.body.error_description || res.body.msg || res.body.message || res.body.error);
          setErr(translateAuthError(raw)); busy(false); return;
        }
        if(kind === 'signup' && !res.body.access_token){
          setErr('가입 확인 메일을 보냈습니다. 메일의 링크를 누른 뒤 로그인해 주세요.'); busy(false); return;
        }
        applyAuthResult(res.body);
        finishLogin();
      }).catch(function(){ setErr('네트워크 오류입니다. 잠시 후 다시 시도하세요.'); busy(false); });
    }
    loginBtn.addEventListener('click', function(){ doAuth('login'); });
    signupBtn.addEventListener('click', function(){ doAuth('signup'); });
    pwEl.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ doAuth('login'); } });
    emailEl.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ pwEl.focus(); } });
  }

  function init(){
    appEl = document.getElementById('app');
    workspaceEl = document.getElementById('workspace');
    noteListEl = document.getElementById('note-list');
    searchInput = document.getElementById('search');

    bindGlobal();
    bindAuthUI();

    if(cloud.on){
      if(restoreSession()){
        showAuth(true);
        cloudLoad().then(function(r){
          if(!(r.found && applyLoadedState(r.data))) seed();
          hideAuth(); bootRender(); cloudPush();
        }).catch(function(){
          cloud.token = null; clearSessionStore(); clearStateBlank(); showAuth(false); bootRender();
        });
      } else {
        clearStateBlank(); showAuth(false); bootRender();
      }
      return;
    }

    if(!loadState()) seed();
    bootRender();
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

})();
</script>
